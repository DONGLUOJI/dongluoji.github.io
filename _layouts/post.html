---
layout: default
---

<article class="post-block">
  <header class="post-header">
    <p class="eyebrow">{{ page.categories | join: " / " }}</p>
    <h1>{{ page.title }}</h1>
    <div class="post-meta">
      <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%Y-%m-%d" }}</time>
      {% if page.tags and page.tags.size > 0 %}
      <span>{{ page.tags | join: " · " }}</span>
      {% endif %}
      <a href="https://github.com/{{ site.author.github }}/{{ site.author.github }}.github.io/blob/main/{{ page.path }}" target="_blank" rel="noopener noreferrer">GitHub 查看</a>
    </div>
    {% if page.description %}
    <p class="post-summary">{{ page.description }}</p>
    {% endif %}
  </header>

  <div class="post-content">
    {{ content }}
  </div>
</article>
