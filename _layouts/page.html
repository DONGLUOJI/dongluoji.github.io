---
layout: default
---

<section class="page-block">
  {% unless page.hide_header %}
  <header class="page-header">
    {% if page.kicker %}<p class="eyebrow">{{ page.kicker }}</p>{% endif %}
    <h1>{{ page.title }}</h1>
    {% if page.description %}<p>{{ page.description }}</p>{% endif %}
  </header>
  {% endunless %}

  <div class="page-content">
    {{ content }}
  </div>
</section>
